version: "labelox-in-0.1.0"   # ids 1-45 frozen; 46-150 are the P2 long-tail expansion (additive)
hierarchy_levels: 4
attributes:
  occlusion:      { type: enum, values: [0, 25, 50, 75, 100] }
  truncation:     { type: float, range: [0.0, 1.0] }
  direction:      { type: enum, values: [same, cross, wrong_way] }
  helmet:         { type: bool_array }          # per rider
  passenger_load: { type: int }
  overload:       { type: bool }
  on_shoulder:    { type: bool }
  marking_state:  { type: enum, values: [present, faded, absent] }
  blocks_lane:    { type: bool }
  static:         { type: bool }
  articulated:    { type: bool }
  signal_state:   { type: enum, values: [R, Y, G, "off"] }
  livery:         { type: bool }
  # ---- P2 behavioral attributes: dynamic per-object state for planning + prediction. Global like the
  # rest; annotators fill the ones relevant to the object's class (vehicles get motion/brake/indicator,
  # signals get signal_arrow/kind/mount, etc). YAML-boolean words (on/off/none) are quoted so they stay
  # strings. ----
  motion:         { type: enum, values: [moving, stopped, parked, waiting] }
  maneuver:       { type: enum, values: [straight, turning_left, turning_right, u_turn, reversing] }
  brake:          { type: enum, values: ["on", "off"] }
  indicator:      { type: enum, values: ["off", left, right, hazard] }
  lane_position:  { type: enum, values: [ego, left, right, oncoming, opposite] }
  occlusion_pct:  { type: int }                 # precise 0-100 occlusion when the bucket is not enough
  signal_arrow:   { type: enum, values: ["none", left, right, straight, u_turn] }
  signal_kind:    { type: enum, values: [vehicle, pedestrian, cyclist] }
  signal_mount:   { type: enum, values: [pole, gantry, wall, portable] }
  pole_id:        { type: int }                 # id of the pole/structure a signal or sign is mounted on

# Per-subclass (L1) applicable-attribute allowlist. An object's class restricts which global attributes
# apply, so the editor shows only the relevant ones and validation rejects the rest. A subclass not listed
# here means all attributes apply (backward compatible).
attribute_scope:
  two_wheeler:   [occlusion, occlusion_pct, truncation, direction, motion, maneuver, brake, indicator, lane_position, helmet, passenger_load, overload, static]
  three_wheeler: [occlusion, occlusion_pct, truncation, direction, motion, maneuver, brake, indicator, lane_position, passenger_load, overload, livery, static]
  four_wheeler:  [occlusion, occlusion_pct, truncation, direction, motion, maneuver, brake, indicator, lane_position, livery, static]
  heavy:         [occlusion, occlusion_pct, truncation, direction, motion, maneuver, brake, indicator, lane_position, articulated, overload, livery, static]
  vru:           [occlusion, occlusion_pct, truncation, direction, motion, lane_position, on_shoulder, helmet]
  animal:        [occlusion, occlusion_pct, truncation, motion, on_shoulder, static]
  fixed:         [occlusion, truncation, signal_state, signal_arrow, signal_kind, signal_mount, marking_state, blocks_lane, static, pole_id]
  temporary:     [occlusion, truncation, blocks_lane, static, on_shoulder]
  boundary:      [occlusion, truncation, marking_state, blocks_lane]
classes:
